  xz-content-service:
    build: ./xz-content-service
    container_name: xz-content-service
    env_file:
      - ./xz-content-service/.env
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=xz_content
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POINT_SERVICE_URL=http://xz-point-service:3007
    depends_on:
      - mongodb
      - redis
    volumes:
      - shared_uploads:/app/uploads
    networks:
      - xz-network

  xz-chat-service:
    build: ./xz-chat-service
    container_name: xz-chat-service
    env_file:
      - ./xz-chat-service/.env
    environment:
      - PORT=3004
      - mongodb_uri=mongodb://mongodb:27017
      - mongodb_db_name=xz_chat_db
      - redis_host=redis
      - redis_port=6379
      - USER_SERVICE_URL=http://xz-user-service:3006
      - POINT_SERVICE_URL=http://xz-point-service:3007
      - NOTIFICATION_SERVICE_URL=http://xz-notification-service:3010
    depends_on:
      - mongodb
      - redis
    volumes:
      - shared_uploads:/app/public/uploads
    networks:
      - xz-network

  xz-point-service:
    build: ./xz-point-service
    container_name: xz-point-service
    environment:
      - PORT=3007
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=xz_points
      - USER_SERVICE_URL=http://xz-user-service:3006
    depends_on:
      - mongodb
    networks:
      - xz-network

  xz-feed-service:
    build: ./xz-feed-service
    container_name: xz-feed-service
    environment:
      - PORT=3009
      - USER_SERVICE_URL=http://xz-user-service:3006
      - CONTENT_SERVICE_URL=http://xz-content-service:3005
    depends_on:
      - xz-user-service
      - xz-content-service
    networks:
      - xz-network

  xz-notification-service:
    build: ./xz-notification-service
    container_name: xz-notification-service
    environment:
      - PORT=3010
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=xz_notifications
    depends_on:
      - mongodb
    networks:
      - xz-network

  # ── FRONTEND SERVICE ────────────────────────────────────────────────────────
  xz-frontend:
    build: ./xz-chat-service/frontend
    container_name: xz-frontend
    ports:
      - "5173:80"
    depends_on:
      - xz-api-gateway
    networks:
      - xz-network

  xz-api-gateway:
    build: ./xz-api-gateway
    container_name: xz-api-gateway
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=xz_jwt_secret_shared_2026_key
      - USER_SERVICE_URL=http://xz-user-service:3006
      - CONTENT_SERVICE_URL=http://xz-content-service:3005
      - CHAT_SERVICE_URL=http://xz-chat-service:3004
      - FEED_SERVICE_URL=http://xz-feed-service:3009
      - NOTIFICATION_SERVICE_URL=http://xz-notification-service:3010
      - POINT_SERVICE_URL=http://xz-point-service:3007
    depends_on:
      - xz-user-service
      - xz-content-service
      - xz-chat-service
      - xz-feed-service
      - xz-notification-service
      - xz-point-service
    networks:
      - xz-network

networks:
  xz-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  shared_uploads:
