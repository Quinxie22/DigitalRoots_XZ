services:
  # ── DATABASES ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: xz-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - xz-network

  redis:
    image: redis:alpine
    container_name: xz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - xz-network

  # ── BACKEND SERVICES ────────────────────────────────────────────────────────
  xz-user-service:
    build: ./xz-user-service
    container_name: xz-user-service
    environment:
      - PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=xz_users
      - JWT_SECRET=xz_jwt_secret_shared_2026_key
